apiVersion: coda/v1alpha1
kind: Skill
metadata:
  name: Coda-classic
  version: "1"
  description: Coda 经典 full、hotfix、tweak 工作流的内部兼容编排
goal:
  statement: 在不改变用户命令面的前提下稳定推进或恢复经典 Coda Run
  inputs:
    - name: classic-state
      description: 已校验且与 Run 投影一致的 ClassicState
      required: true
    - name: evidence
      description: Classic Evidence 收集器生成的结构化证据
      required: true
  outputs:
    - name: run-state
      description: 原子同步后的 Classic 与 Run 状态
      required: true
  success:
    - 旧字段与 Run 字段保持一致
    - 每个步骤只调用声明的公开 Coda Skill
    - completed 状态通过 completion eval
orchestration:
  mode: deterministic
  entry: full.open
  steps:
    - id: full.open
      action: { type: invoke_skill, ref: Coda-open }
      next: full.design.handoff
    - id: full.design.handoff
      action: { type: invoke_skill, ref: Coda-design }
      next: full.design.document
    - id: full.design.document
      action: { type: invoke_skill, ref: Coda-design }
      next: full.build.plan
    - id: full.build.plan
      action: { type: invoke_skill, ref: Coda-build }
      next: full.build.plan-ready
    - id: full.build.plan-ready
      action: { type: invoke_skill, ref: Coda-build }
      next: full.build.configure
    - id: full.build.configure
      action: { type: invoke_skill, ref: Coda-build }
      next: full.build.execute
    - id: full.build.execute
      action: { type: invoke_skill, ref: Coda-build }
      next: full.build.complete
    - id: full.build.complete
      action: { type: invoke_skill, ref: Coda-build }
      next: full.verify.run
    - id: full.build.fix
      action: { type: invoke_skill, ref: Coda-build }
      next: full.build.execute
    - id: full.verify.run
      action: { type: invoke_skill, ref: Coda-verify }
      next: full.verify.branch
    - id: full.verify.branch
      action: { type: invoke_skill, ref: Coda-verify }
      next: full.archive.confirm
    - id: full.archive.confirm
      action: { type: invoke_skill, ref: Coda-archive }
      next: full.archive.execute
    - id: full.archive.execute
      action: { type: invoke_skill, ref: Coda-archive }
      next: completed
    - id: hotfix.open
      action: { type: invoke_skill, ref: Coda-hotfix }
      next: hotfix.build.execute
    - id: hotfix.build.execute
      action: { type: invoke_skill, ref: Coda-build }
      next: hotfix.build.complete
    - id: hotfix.build.complete
      action: { type: invoke_skill, ref: Coda-build }
      next: hotfix.verify.run
    - id: hotfix.verify.run
      action: { type: invoke_skill, ref: Coda-verify }
      next: hotfix.verify.branch
    - id: hotfix.verify.branch
      action: { type: invoke_skill, ref: Coda-verify }
      next: hotfix.archive.confirm
    - id: hotfix.archive.confirm
      action: { type: invoke_skill, ref: Coda-archive }
      next: hotfix.archive.execute
    - id: hotfix.archive.execute
      action: { type: invoke_skill, ref: Coda-archive }
      next: completed
    - id: tweak.open
      action: { type: invoke_skill, ref: Coda-tweak }
      next: tweak.build.execute
    - id: tweak.build.execute
      action: { type: invoke_skill, ref: Coda-build }
      next: tweak.build.complete
    - id: tweak.build.complete
      action: { type: invoke_skill, ref: Coda-build }
      next: tweak.verify.run
    - id: tweak.verify.run
      action: { type: invoke_skill, ref: Coda-verify }
      next: tweak.verify.branch
    - id: tweak.verify.branch
      action: { type: invoke_skill, ref: Coda-verify }
      next: tweak.archive.confirm
    - id: tweak.archive.confirm
      action: { type: invoke_skill, ref: Coda-archive }
      next: tweak.archive.execute
    - id: tweak.archive.execute
      action: { type: invoke_skill, ref: Coda-archive }
      next: completed
    - id: completed
      action: { type: checkpoint }
      completionEvals:
        - classic-completed
skills:
  - id: Coda-open
  - id: Coda-design
  - id: Coda-build
  - id: Coda-verify
  - id: Coda-archive
  - id: Coda-hotfix
  - id: Coda-tweak
agents: []
tools: []
